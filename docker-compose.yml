# 可选：在仓库根目录用 Docker 跑本地 MySQL，供 backend Prisma 使用。
# 本机已安装 MySQL 且占用 3306 时，默认把容器映射到 3307（见 docker/mysql.env.example）。
#
# 1. copy docker\mysql.env.example docker\mysql.env 并设置密码
# 2. docker compose up -d
# 3. backend/.env 中 DATABASE_URL 示例（映射端口为 3307）：
#    mysql://root:你的密码@127.0.0.1:3307/techblog
# 4. cd backend && npx dotenvx run -- npx prisma migrate deploy
#    npm run db:seed（可选）
#
# 线上数据库请用 Railway / 其它云 MySQL，见 docs/RAILWAY-MYSQL.md

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - docker/mysql.env
    environment:
      MYSQL_DATABASE: techblog
    ports:
      # 固定映射到本机 3307，避免与已安装的 MySQL(3306) 冲突；DATABASE_URL 里端口写 3307
      - "3307:3306"
    volumes:
      - techblog_mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s

volumes:
  techblog_mysql_data:
